<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Research Mode social preview</title>
  <desc id="desc">Durable, review-gated background research for OpenClaw agents.</desc>
  <defs>
